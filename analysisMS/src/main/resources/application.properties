server.port=8086
spring.application.name=analysisMS

# Shared MySQL Database (Read-Only access to expense_db)
spring.datasource.url=jdbc:mysql://localhost:3306/expense_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
# ddl-auto=none ensures we only read and never modify the shared database schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# External Services
googleai.base-url=http://localhost:8080
